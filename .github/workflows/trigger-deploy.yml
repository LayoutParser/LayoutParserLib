name: Trigger Deploy on LayoutParserApi

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**'
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Trigger deploy workflow in LayoutParserApi
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GH_PAT_TOKEN || secrets.GITHUB_TOKEN }}
        script: |
          const owner = 'Elsonc1';
          const repo = 'LayoutParserApi';
          
          // Buscar workflows do repositório
          console.log('Buscando workflow de deploy...');
          const workflowsResponse = await github.request('GET /repos/{owner}/{repo}/actions/workflows', {
            owner: owner,
            repo: repo
          });
          
          const workflows = workflowsResponse.data.workflows;
          const deployWorkflow = workflows.find(
            w => w.name === 'Deploy to Production Server' || w.path.includes('deploy.yml')
          );
          
          if (!deployWorkflow) {
            throw new Error('Workflow deploy.yml não encontrado no repositório LayoutParserApi');
          }
          
          console.log(`Workflow encontrado: ${deployWorkflow.name} (ID: ${deployWorkflow.id})`);
          
          // Tentar disparar na branch main primeiro
          let ref = 'main';
          try {
            await github.request('POST /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches', {
              owner: owner,
              repo: repo,
              workflow_id: deployWorkflow.id,
              ref: ref
            });
            console.log(`✅ Workflow de deploy acionado na branch ${ref}`);
          } catch (error) {
            // Se falhar, tentar na branch master
            if (error.status === 404 || error.message.includes('not found')) {
              console.log(`Tentando na branch master...`);
              ref = 'master';
              await github.request('POST /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches', {
                owner: owner,
                repo: repo,
                workflow_id: deployWorkflow.id,
                ref: ref
              });
              console.log(`✅ Workflow de deploy acionado na branch ${ref}`);
            } else {
              throw error;
            }
          }
          
    - name: Wait for deployment (optional)
      run: |
        echo "⏳ Workflow de deploy foi acionado. Verifique o status em:"
        echo "https://github.com/Elsonc1/LayoutParserApi/actions"

