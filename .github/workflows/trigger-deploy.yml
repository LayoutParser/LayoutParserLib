name: Trigger Deploy on LayoutParserApi

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**'
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Trigger deploy workflow in LayoutParserApi
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GH_PAT_TOKEN || secrets.GITHUB_TOKEN }}
        script: |
          const owner = 'Elsonc1';
          const repo = 'LayoutParserApi';
          const workflowFile = '.github/workflows/deploy.yml';
          
          // Tentar disparar o workflow diretamente pelo caminho do arquivo
          // Primeiro tentar na branch main
          const branches = ['main', 'master'];
          let success = false;
          let lastError = null;
          
          for (const ref of branches) {
            try {
              console.log(`Tentando disparar workflow na branch ${ref}...`);
              await github.request('POST /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches', {
                owner: owner,
                repo: repo,
                workflow_id: workflowFile,
                ref: ref
              });
              console.log(`✅ Workflow de deploy acionado na branch ${ref}`);
              success = true;
              break;
            } catch (error) {
              lastError = error;
              console.log(`Falha na branch ${ref}: ${error.message}`);
              if (error.status === 404) {
                // Se for 404, tentar próxima branch
                continue;
              } else {
                // Se for outro erro, lançar exceção
                throw error;
              }
            }
          }
          
          if (!success) {
            throw new Error(`Não foi possível acionar o workflow. Último erro: ${lastError?.message || 'Desconhecido'}`);
          }
          
    - name: Wait for deployment (optional)
      run: |
        echo "⏳ Workflow de deploy foi acionado. Verifique o status em:"
        echo "https://github.com/Elsonc1/LayoutParserApi/actions"

